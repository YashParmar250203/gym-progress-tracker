spring.application.name=api-gateway-service
server.port=8080

# Eureka connection
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# User Service
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

# Workout Service
spring.cloud.gateway.routes[1].id=workout-service
spring.cloud.gateway.routes[1].uri=lb://WORKOUT-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/exercise/**,/workout/**

# Analytics Service
spring.cloud.gateway.routes[2].id=analytics-service
spring.cloud.gateway.routes[2].uri=lb://ANALYTICS-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/analytics/**

# Block internal routes from external access
spring.cloud.gateway.routes[3].id=block-internal
spring.cloud.gateway.routes[3].uri=lb://WORKOUT-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/internal/**
spring.cloud.gateway.routes[3].filters[0]=SetStatus=403

# AI Service
spring.cloud.gateway.routes[4].id=ai-service
spring.cloud.gateway.routes[4].uri=lb://AI-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/ai/**

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true