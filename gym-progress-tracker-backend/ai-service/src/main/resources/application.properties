spring.application.name=ai-service
server.port=8084
spring.data.mongodb.database=gym_ai_db

gemini.api.key=REMOVED
gemini.api.model=gemini-2.5-flash-lite
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models


# Eureka Server URL
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Register this service with Eureka
eureka.client.register-with-eureka=true

# Fetch registry from Eureka
eureka.client.fetch-registry=true

management.endpoints.web.exposure.include=health,info

jwt.secret=mySuperSecretKeyForGymProgressTrackerProject123456
jwt.expiration=86400000